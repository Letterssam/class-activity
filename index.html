<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>나에게 어울리는 직업 월드컵</title>

<!-- Pretendard 폰트 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  as="style"
  crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>

<style>
/* =========================================================
   직업 월드컵 - style.css
   파스텔톤 / 둥근 카드 / 귀여운 느낌 / 반응형
========================================================= */

:root {
  /* 색상 팔레트 */
  --color-white: #ffffff;
  --color-sky: #d7f0fb;
  --color-sky-strong: #6dc8ec;
  --color-mint: #cdf5ea;
  --color-mint-strong: #3ecfa6;
  --color-yellow: #fff3c2;
  --color-yellow-strong: #ffcb3d;
  --color-text: #3a3a4a;
  --color-text-soft: #6b6f8a;
  --color-danger: #ff8fa3;

  --shadow-soft: 0 8px 24px rgba(109, 200, 236, 0.25);
  --shadow-card: 0 10px 30px rgba(76, 91, 158, 0.14);
  --radius-lg: 28px;
  --radius-md: 20px;
  --radius-sm: 14px;

  --font-main: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-main);
  color: var(--color-text);
  background: linear-gradient(160deg, var(--color-sky) 0%, var(--color-white) 45%, var(--color-mint) 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* =========================================================
   배경 장식
========================================================= */
.bg-decoration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.float-emoji {
  position: absolute;
  font-size: 2.2rem;
  opacity: 0.55;
  animation: floatUpDown 6s ease-in-out infinite;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
}

.e1 { top: 8%;  left: 6%;  animation-delay: 0s; }
.e2 { top: 18%; left: 88%; animation-delay: 1.2s; font-size: 2.6rem; }
.e3 { top: 65%; left: 4%;  animation-delay: 2s; }
.e4 { top: 78%; left: 85%; animation-delay: 0.6s; }
.e5 { top: 40%; left: 92%; animation-delay: 1.6s; font-size: 1.8rem; }
.e6 { top: 50%; left: 2%;  animation-delay: 2.6s; font-size: 1.6rem; }

@keyframes floatUpDown {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(6deg); }
}

/* =========================================================
   레이아웃 / 화면 전환
========================================================= */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 48px;
}

.screen {
  display: none;
  width: 100%;
  max-width: 900px;
  animation: fadeIn 0.5s ease;
}

.screen.active {
  display: block;
}

.screen.fade-out {
  animation: fadeOut 0.35s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-14px); }
}

/* =========================================================
   카드 공통 스타일
========================================================= */
.card-pop {
  background: var(--color-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}

/* =========================================================
   1. 시작 화면
========================================================= */
.start-card {
  max-width: 520px;
  margin: 0 auto;
  padding: 44px 36px 40px;
  text-align: center;
}

.start-emoji {
  font-size: 4rem;
  margin-bottom: 8px;
  animation: bounceEmoji 2.4s ease-in-out infinite;
}

@keyframes bounceEmoji {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.title {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1.35;
  color: var(--color-text);
  margin-bottom: 12px;
}

.subtitle {
  font-size: 1rem;
  color: var(--color-text-soft);
  line-height: 1.6;
  margin-bottom: 28px;
}

.input-group {
  text-align: left;
  margin-bottom: 24px;
}

.input-group label {
  display: block;
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--color-text);
}

#student-name {
  width: 100%;
  padding: 14px 18px;
  font-size: 1.05rem;
  font-family: var(--font-main);
  border: 2px solid var(--color-sky);
  border-radius: var(--radius-md);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fbfeff;
}

#student-name:focus {
  border-color: var(--color-sky-strong);
  box-shadow: 0 0 0 4px rgba(109, 200, 236, 0.2);
}

.round-select {
  margin-bottom: 22px;
}

.round-select-label {
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 10px;
  text-align: left;
}

.round-buttons {
  display: flex;
  gap: 12px;
}

.round-btn {
  flex: 1;
  padding: 14px 0;
  font-family: var(--font-main);
  font-size: 1rem;
  font-weight: 700;
  border: 2px solid var(--color-mint);
  background: var(--color-white);
  color: var(--color-text-soft);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s ease;
}

.round-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-soft);
}

.round-btn.selected {
  background: var(--color-mint-strong);
  border-color: var(--color-mint-strong);
  color: var(--color-white);
}

.sound-toggle {
  margin-bottom: 26px;
  text-align: left;
}

.sound-toggle label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--color-text-soft);
}

.sound-toggle input {
  width: 18px;
  height: 18px;
  accent-color: var(--color-sky-strong);
  cursor: pointer;
}

.btn-primary {
  font-family: var(--font-main);
  font-weight: 800;
  color: var(--color-white);
  background: linear-gradient(135deg, var(--color-sky-strong), var(--color-mint-strong));
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
  box-shadow: var(--shadow-soft);
  padding: 12px 24px;
  font-size: 0.95rem;
  text-decoration: none;
  display: inline-block;
  text-align: center;
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 12px 28px rgba(62, 207, 166, 0.35);
}

.btn-primary:active:not(:disabled) {
  transform: translateY(0) scale(0.98);
}

.btn-primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.btn-big {
  width: 100%;
  padding: 18px 0;
  font-size: 1.15rem;
}

.name-warning {
  margin-top: 12px;
  color: var(--color-danger);
  font-weight: 700;
  font-size: 0.9rem;
  animation: shake 0.4s ease;
}

.name-warning.hidden {
  display: none;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* =========================================================
   2. 게임 화면
========================================================= */
#screen-game {
  text-align: center;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.round-badge {
  background: var(--color-yellow-strong);
  color: var(--color-white);
  font-weight: 800;
  font-size: 1.05rem;
  padding: 8px 22px;
  border-radius: 999px;
  box-shadow: var(--shadow-soft);
}

.match-counter {
  background: var(--color-white);
  color: var(--color-text-soft);
  font-weight: 700;
  font-size: 0.95rem;
  padding: 8px 18px;
  border-radius: 999px;
  box-shadow: var(--shadow-card);
}

.progress-wrap {
  max-width: 520px;
  margin: 0 auto 18px;
}

.progress-bar {
  width: 100%;
  height: 12px;
  background: var(--color-white);
  border-radius: 999px;
  overflow: hidden;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--color-sky-strong), var(--color-mint-strong));
  border-radius: 999px;
  transition: width 0.4s ease;
}

.game-question {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--color-text-soft);
  margin-bottom: 26px;
}

.vs-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.job-card {
  background: var(--color-white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 30px 22px 26px;
  width: 300px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  border: 3px solid transparent;
  user-select: none;
}

.job-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 16px 32px rgba(109, 200, 236, 0.3);
  border-color: var(--color-sky-strong);
}

.job-card:active {
  transform: scale(0.97);
}

.job-card.picked {
  animation: pickWin 0.5s ease forwards;
  border-color: var(--color-mint-strong);
  background: linear-gradient(160deg, #ffffff, var(--color-mint));
}

.job-card.not-picked {
  animation: pickLose 0.5s ease forwards;
}

@keyframes pickWin {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.12); }
  100% { transform: scale(1.05); opacity: 1; }
}

@keyframes pickLose {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.85); opacity: 0; }
}

.job-emoji {
  font-size: 4.2rem;
  margin-bottom: 14px;
  line-height: 1;
}

.job-name {
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 8px;
}

.job-field-tag {
  display: inline-block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--color-sky-strong);
  background: var(--color-sky);
  padding: 4px 12px;
  border-radius: 999px;
}

/* 직업이 일하는 장면을 표현한 일러스트 패널 (실사진 대신 아이콘 조합) */
.job-scene {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 10px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--color-sky) 0%, var(--color-mint) 100%);
  font-size: 1.7rem;
  line-height: 1;
}

.job-scene span {
  display: inline-block;
  animation: sceneWiggle 3s ease-in-out infinite;
}

.job-scene span:nth-child(2) { animation-delay: 0.3s; }
.job-scene span:nth-child(3) { animation-delay: 0.6s; }

@keyframes sceneWiggle {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-4px) rotate(-4deg); }
}

.job-desc {
  margin-top: 14px;
  font-size: 0.86rem;
  line-height: 1.55;
  color: var(--color-text-soft);
  text-align: left;
}

.vs-badge {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--color-yellow-strong);
  text-shadow: 0 2px 0 rgba(0,0,0,0.05);
  flex-shrink: 0;
}

.btn-ghost {
  font-family: var(--font-main);
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--color-text-soft);
  background: transparent;
  border: 2px solid #e2e6f0;
  padding: 10px 22px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-ghost:hover {
  background: var(--color-white);
  border-color: var(--color-sky-strong);
  color: var(--color-sky-strong);
}

/* =========================================================
   라운드 전환 오버레이 (32강 -> 16강 등 확실히 알려주는 화면)
========================================================= */
.round-transition {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(58, 58, 74, 0.55);
  backdrop-filter: blur(2px);
  animation: fadeIn 0.3s ease;
}

.round-transition.hidden {
  display: none;
}

.round-transition-inner {
  background: var(--color-white);
  border-radius: var(--radius-lg);
  padding: 44px 40px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  max-width: 380px;
  width: 88%;
  animation: transitionPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes transitionPop {
  0%   { transform: scale(0.6); opacity: 0; }
  60%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.transition-check {
  font-size: 3rem;
  margin-bottom: 6px;
  animation: bounceEmoji 1.2s ease-in-out infinite;
}

.transition-prev {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--color-text-soft);
  text-decoration: line-through;
  text-decoration-color: var(--color-danger);
  margin-bottom: 4px;
}

.transition-arrow {
  font-size: 1.4rem;
  color: var(--color-mint-strong);
  margin-bottom: 4px;
}

.transition-next {
  font-size: 1.7rem;
  font-weight: 900;
  color: var(--color-sky-strong);
  margin-bottom: 24px;
}

/* =========================================================
   3. 결과 화면
========================================================= */
#screen-result {
  position: relative;
}

.result-wrap {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
}

.congrats {
  font-size: 1.6rem;
  font-weight: 800;
  margin-bottom: 8px;
  animation: bounceEmoji 1.6s ease-in-out infinite;
}

.result-title {
  font-size: 1.15rem;
  color: var(--color-text-soft);
  font-weight: 700;
  margin-bottom: 24px;
}

#result-student-name {
  color: var(--color-sky-strong);
}

.winner-card {
  padding: 36px 24px;
  margin-bottom: 22px;
  background: linear-gradient(160deg, #ffffff, var(--color-yellow));
  border: 3px solid var(--color-yellow-strong);
}

.winner-emoji {
  font-size: 5rem;
  margin-bottom: 10px;
}

.winner-name {
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 10px;
}

.winner-crown {
  font-size: 1rem;
  font-weight: 700;
  color: var(--color-yellow-strong);
}

.field-analysis {
  padding: 22px 24px;
  margin-bottom: 22px;
  text-align: left;
}

.field-analysis h3 {
  font-size: 1.05rem;
  margin-bottom: 8px;
  color: var(--color-mint-strong);
}

.field-analysis p {
  color: var(--color-text-soft);
  line-height: 1.6;
  font-size: 0.95rem;
}

.same-field-section {
  margin-bottom: 22px;
  text-align: left;
}

.same-field-section h3 {
  font-size: 1.05rem;
  margin-bottom: 12px;
}

.same-field-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 12px;
}

.mini-job-card {
  background: var(--color-white);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-card);
  padding: 16px 8px;
  text-align: center;
  transition: transform 0.2s ease;
}

.mini-job-card:hover {
  transform: translateY(-4px);
}

.mini-job-card .mini-emoji {
  font-size: 1.8rem;
  margin-bottom: 6px;
}

.mini-job-card .mini-name {
  font-size: 0.82rem;
  font-weight: 700;
}

.reflection-card {
  padding: 22px 24px;
  margin-bottom: 26px;
  text-align: left;
  background: linear-gradient(160deg, #ffffff, var(--color-sky));
}

.reflection-card h3 {
  font-size: 1.05rem;
  margin-bottom: 12px;
  color: var(--color-sky-strong);
}

.reflection-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.reflection-list li {
  font-size: 0.92rem;
  color: var(--color-text-soft);
  line-height: 1.5;
  padding-left: 26px;
  position: relative;
}

.reflection-list li::before {
  content: "💡";
  position: absolute;
  left: 0;
  top: 0;
}

.result-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  padding-bottom: 20px;
}

/* =========================================================
   폭죽(컨페티) 애니메이션
========================================================= */
#confetti-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}

.confetti-piece {
  position: absolute;
  top: -20px;
  border-radius: 3px;
  animation-name: confettiFall;
  animation-timing-function: ease-in;
  animation-fill-mode: forwards;
}

@keyframes confettiFall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(540deg);
    opacity: 0.9;
  }
}

/* =========================================================
   반응형
========================================================= */
@media (max-width: 640px) {
  .title { font-size: 1.6rem; }
  .start-card { padding: 32px 22px 30px; }
  .vs-wrap { gap: 10px; }
  .job-card { width: 92%; max-width: 340px; padding: 22px 18px 20px; }
  .job-emoji { font-size: 3.4rem; }
  .job-name { font-size: 1.15rem; }
  .job-scene { font-size: 1.4rem; }
  .job-desc { font-size: 0.84rem; }
  .vs-badge { font-size: 1.2rem; }
  .winner-emoji { font-size: 3.6rem; }
  .winner-name { font-size: 1.4rem; }
}

@media (max-width: 400px) {
  .job-card { width: 100%; }
}

/* 모션 최소화 선호 사용자를 위한 처리 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

</style>
</head>
<body>

  <!-- 배경에 떠다니는 장식 이모지 -->
  <div class="bg-decoration" aria-hidden="true">
    <span class="float-emoji e1">⭐</span>
    <span class="float-emoji e2">🎈</span>
    <span class="float-emoji e3">☁️</span>
    <span class="float-emoji e4">🌈</span>
    <span class="float-emoji e5">✨</span>
    <span class="float-emoji e6">☁️</span>
  </div>

  <main id="app">

    <!-- =========================================
         1. 시작 화면
    ========================================== -->
    <section id="screen-start" class="screen active">
      <div class="start-card card-pop">
        <div class="start-emoji">🌎</div>
        <h1 class="title">나에게 어울리는<br />직업 월드컵</h1>
        <p class="subtitle">좋아하는 직업을 선택하면서<br />나의 진로를 탐색해 보아요!</p>

        <div class="input-group">
          <label for="student-name">✏️ 이름을 입력해 주세요</label>
          <input
            type="text"
            id="student-name"
            placeholder="예) 김낭만"
            maxlength="10"
            autocomplete="off"
          />
        </div>

        <div class="round-select">
          <p class="round-select-label">🏆 몇 강으로 시작할까요?</p>
          <div class="round-buttons">
            <button type="button" class="round-btn selected" data-round="32">32강</button>
            <button type="button" class="round-btn" data-round="64">64강</button>
          </div>
        </div>

        <div class="sound-toggle">
          <label>
            <input type="checkbox" id="sound-checkbox" checked />
            <span>🔊 효과음 켜기</span>
          </label>
        </div>

        <button type="button" id="start-btn" class="btn-primary btn-big" disabled>
          시작하기 🚀
        </button>
        <p id="name-warning" class="name-warning hidden">먼저 이름을 입력해 주세요! 😊</p>
      </div>
    </section>

    <!-- =========================================
         2. 게임 화면
    ========================================== -->
    <section id="screen-game" class="screen">
      <div class="game-header">
        <div class="round-badge" id="round-badge">32강</div>
        <div class="match-counter" id="match-counter">1 / 16 경기</div>
      </div>

/* ---------------------------------------------------------
   3. 사운드 (Web Audio API - 외부 파일 없이 간단한 효과음 생성)
--------------------------------------------------------- */
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// freq: 주파수, duration: 길이(초), type: 파형
function playTone(freq, duration = 0.15, type = "sine") {
  if (!state.soundOn) return;
  try {
    const ctx = getAudioContext();
    const oscillator = ctx.createOscillator();
    const gain = ctx.createGain();

    oscillator.type = type;
    oscillator.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

    oscillator.connect(gain);
    gain.connect(ctx.destination);

    oscillator.start();
    oscillator.stop(ctx.currentTime + duration);
  } catch (err) {
    // 오디오 재생 실패 시 조용히 무시 (게임 진행에 영향 없음)
    console.warn("사운드 재생 실패:", err);
  }
}

// Fisher-Yates 셔플 (무작위 대진표 생성용)
function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------------------------------------------------
   6. 시작 화면 로직
--------------------------------------------------------- */
function initStartScreen() {
  // 라운드 선택 버튼
  el.roundBtns.forEach((btn) => {
    btn.addEventListener("click", () => {
      el.roundBtns.forEach((b) => b.classList.remove("selected"));
      btn.classList.add("selected");
      state.totalRound = parseInt(btn.dataset.round, 10);
      playClickSound();
    });
  });

  // 이름 입력에 따라 시작 버튼 활성화
  el.nameInput.addEventListener("input", () => {
    const hasName = el.nameInput.value.trim().length > 0;
    el.startBtn.disabled = !hasName;
    el.nameWarning.classList.add("hidden");
  });

  // 효과음 토글
  el.soundCheckbox.addEventListener("change", () => {
    state.soundOn = el.soundCheckbox.checked;
  });

  // 시작하기 버튼
  el.startBtn.addEventListener("click", () => {
    const name = el.nameInput.value.trim();
    if (!name) {
      el.nameWarning.classList.remove("hidden");
      return;
    }
    state.studentName = name;
    playClickSound();
    startGame();
  });

  // 엔터 키로도 시작 가능하게
  el.nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && el.nameInput.value.trim().length > 0) {
      el.startBtn.click();
    }
  });
}

/* ---------------------------------------------------------
   7. 게임 시작 / 대진표 생성
--------------------------------------------------------- */
function startGame() {
  // 전체 직업 중 필요한 인원만 무작위로 뽑기
  const shuffled = shuffleArray(state.allJobs);
  state.bracket = shuffled.slice(0, state.totalRound);

  state.nextBracket = [];
  state.currentMatchIndex = 0;
  state.totalMatchesInRound = state.bracket.length / 2;

  // 전체 경기 수 계산 (진행률 표시용): 32강이면 16+8+4+2+1 = 31경기
  state.totalMatchesOverall = state.totalRound - 1;
  state.matchesDoneOverall = 0;

  switchScreen(el.screenStart, el.screenGame);
  setTimeout(renderCurrentMatch, 340);
}

/* ---------------------------------------------------------
   8. 현재 경기 렌더링
--------------------------------------------------------- */
function renderCurrentMatch() {
  const roundLabel = getRoundLabel(state.bracket.length);
  el.roundBadge.textContent = roundLabel;
  el.matchCounter.textContent = `${state.currentMatchIndex + 1} / ${state.totalMatchesInRound} 경기`;

  // 진행률 바 업데이트
  const progressPercent = Math.round((state.matchesDoneOverall / state.totalMatchesOverall) * 100);
  el.progressFill.style.width = `${progressPercent}%`;

  const jobA = state.bracket[state.currentMatchIndex * 2];
  const jobB = state.bracket[state.currentMatchIndex * 2 + 1];

  fillJobCard(el.emojiLeft, el.nameLeft, el.fieldLeft, el.sceneLeft, el.descLeft, jobA);
  fillJobCard(el.emojiRight, el.nameRight, el.fieldRight, el.sceneRight, el.descRight, jobB);

  // 카드 상태 초기화 (애니메이션 클래스 제거)
  [el.cardLeft, el.cardRight].forEach((card) => {
    card.classList.remove("picked", "not-picked");
    card.style.pointerEvents = "auto";
  });

  // data 속성에 현재 직업 저장
  el.cardLeft.currentJob = jobA;
  el.cardRight.currentJob = jobB;
}

function fillJobCard(emojiEl, nameEl, fieldEl, sceneEl, descEl, job) {
  emojiEl.textContent = job.emoji;
  nameEl.textContent = job.name;
  fieldEl.textContent = job.field;

  // 실제 사진 대신, 저작권 걱정 없는 아이콘 조합으로 "이 직업이 일하는 장면"을 표현
  const sceneIcons = job.scene && job.scene.length ? job.scene : [job.emoji];
  sceneEl.innerHTML = sceneIcons.map((icon) => `<span>${icon}</span>`).join("");

  descEl.textContent = job.description || "";
}

/* ---------------------------------------------------------
   9. 카드 선택 처리
--------------------------------------------------------- */
function handleCardPick(pickedCard, otherCard) {
  // 중복 클릭 방지
  el.cardLeft.style.pointerEvents = "none";
  el.cardRight.style.pointerEvents = "none";

  const winner = pickedCard.currentJob;
  state.nextBracket.push(winner);

  pickedCard.classList.add("picked");
  otherCard.classList.add("not-picked");

  playWinSound();

  state.matchesDoneOverall++;
  state.currentMatchIndex++;

  setTimeout(() => {
    proceedToNext();
  }, 650);
}

function proceedToNext() {
  // 현재 라운드가 아직 안 끝났으면 다음 경기 진행
  if (state.currentMatchIndex < state.totalMatchesInRound) {
    renderCurrentMatch();
    return;
  }

  // 현재 라운드가 끝났으면, 다음 라운드로 넘어가거나 게임 종료
  if (state.nextBracket.length === 1) {
    // 우승자 결정!
    showResult(state.nextBracket[0]);
    return;
  }

  // 다음 라운드로 넘어감 - "OO강 통과!" 화면을 확실히 보여준 뒤 진행
  const prevLabel = getRoundLabel(state.bracket.length);
  const nextLabel = getRoundLabel(state.nextBracket.length);
  showRoundTransition(prevLabel, nextLabel, () => {
    state.bracket = state.nextBracket;
    state.nextBracket = [];
    state.currentMatchIndex = 0;
    state.totalMatchesInRound = state.bracket.length / 2;
    renderCurrentMatch();
  });
}

/* ---------------------------------------------------------
   9-1. 라운드 통과 전환 화면
--------------------------------------------------------- */
let transitionAutoTimer = null;

function showRoundTransition(prevLabel, nextLabel, onContinue) {
  playRoundUpSound();

  el.transitionPrev.textContent = `${prevLabel} 완료`;
  el.transitionNext.textContent = `${nextLabel} 진출! 🎉`;
  el.roundTransition.classList.remove("hidden");

  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    clearTimeout(transitionAutoTimer);
    el.transitionContinueBtn.removeEventListener("click", finish);
    el.roundTransition.classList.add("hidden");
    onContinue();
  };

  el.transitionContinueBtn.addEventListener("click", finish);

  // 학생이 버튼을 누르지 않아도 일정 시간 뒤 자동으로 다음 라운드로 진행
  transitionAutoTimer = setTimeout(finish, 2600);
}

// 카드 클릭 이벤트 등록 (한 번만 등록, currentJob은 매번 갱신됨)
el.cardLeft.addEventListener("click", () => handleCardPick(el.cardLeft, el.cardRight));
el.cardRight.addEventListener("click", () => handleCardPick(el.cardRight, el.cardLeft));

/* ---------------------------------------------------------
   10. 결과 화면
--------------------------------------------------------- */
function showResult(winnerJob) {
  el.resultStudentName.textContent = state.studentName;
  el.winnerEmoji.textContent = winnerJob.emoji;
  el.winnerName.textContent = winnerJob.name;

  // 분야 분석
  el.fieldAnalysisTitle.textContent = winnerJob.field;
  el.fieldAnalysisDesc.textContent = FIELD_INFO[winnerJob.field] || "";

  // 같은 분야의 다른 직업들 (최대 5개, 우승 직업 본인 제외)
  const sameFieldJobs = state.allJobs
    .filter((job) => job.field === winnerJob.field && job.id !== winnerJob.id)
    .slice(0, 5);

  el.sameFieldGrid.innerHTML = sameFieldJobs
    .map(
      (job) => `
        <div class="mini-job-card">
          <div class="mini-emoji">${job.emoji}</div>
          <div class="mini-name">${job.name}</div>
        </div>
      `
    )
    .join("");

  switchScreen(el.screenGame, el.screenResult);
  setTimeout(() => {
    launchConfetti();
    playWinSound();
  }, 350);
}

/* ---------------------------------------------------------
   11. 폭죽(컨페티) 애니메이션
--------------------------------------------------------- */
function launchConfetti() {
  const colors = ["#6dc8ec", "#3ecfa6", "#ffcb3d", "#ff8fa3", "#d7f0fb"];
  const pieceCount = 80;

  el.confettiLayer.innerHTML = "";

  for (let i = 0; i < pieceCount; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";

    const size = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const duration = 2.4 + Math.random() * 1.8;
    const delay = Math.random() * 0.6;

    piece.style.width = `${size}px`;
    piece.style.height = `${size * 0.6}px`;
    piece.style.background = color;
    piece.style.left = `${left}vw`;
    piece.style.animationDuration = `${duration}s`;
    piece.style.animationDelay = `${delay}s`;

    el.confettiLayer.appendChild(piece);
  }

  // 일정 시간 후 컨페티 요소 정리 (성능 관리)
  setTimeout(() => {
    el.confettiLayer.innerHTML = "";
  }, 4500);
}

/* ---------------------------------------------------------
   12. 처음으로 / 다시하기
--------------------------------------------------------- */
function goHome() {
  el.screenGame.classList.remove("active");
  el.screenResult.classList.remove("active");
  el.screenStart.classList.add("active");
  el.confettiLayer.innerHTML = "";
  el.roundTransition.classList.add("hidden");
  clearTimeout(transitionAutoTimer);
}

function retryGame() {
  // 학생 이름은 유지한 채로 새 게임 시작
  el.screenResult.classList.remove("active");
  el.confettiLayer.innerHTML = "";
  el.roundTransition.classList.add("hidden");
  clearTimeout(transitionAutoTimer);
  el.screenGame.classList.add("active");
  startGame();
}

el.homeBtn.addEventListener("click", goHome);
el.homeBtn2.addEventListener("click", goHome);
el.retryBtn.addEventListener("click", retryGame);

/* ---------------------------------------------------------
   13. 초기화
--------------------------------------------------------- */
async function init() {
  await loadJobs();
  initStartScreen();
}

document.addEventListener("DOMContentLoaded", init);

</script>
</body>
</html>
